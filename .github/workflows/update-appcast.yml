name: Update Appcast on Release

on:
  release:
    types: [published]

jobs:
  update-appcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild appcast.xml from releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPCAST_REPO: ${{ github.repository }}
        run: |
          python scripts/sync_appcast_from_releases.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git diff --staged --quiet || git commit -m "Rebuild appcast.xml for ${{ github.event.release.tag_name }}"
          git push origin main
