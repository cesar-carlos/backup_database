name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install widgetbook dependencies
        if: ${{ hashFiles('widgetbook/pubspec.yaml') != '' }}
        working-directory: widgetbook
        run: flutter pub get

      - name: Verify W3C design token snapshot is in sync
        run: dart run tools/generate_tokens.dart --check

      - name: Create minimal .env for tests
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "APP_NAME=Backup Database" > .env
            echo "SINGLE_INSTANCE_ENABLED=true" >> .env
          fi

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Encoding scan (UTF-8 / mojibake)
        run: python scripts/scan_encoding.py

      - name: Verify Windows icon artifacts
        run: python scripts/verify_windows_icons.py

      - name: Verify dart format
        run: dart format --set-exit-if-changed --output=none lib test tools

      - name: Design system guard (atoms/molecules/organisms)
        run: dart run tools/design_system_guard.dart --fail-on-findings --enforce-target-size

      - name: Reject inline UI locale _t helpers (PR-D D1)
        run: |
          set -euo pipefail
          if grep -RIn --include='*.dart' -E 'String _t\((String pt, String en|BuildContext context, String pt, String en)\)' lib; then
            echo 'Forbidden: inline String _t(...) — use appLocaleString from core/l10n.'
            exit 1
          fi

      - name: Run unit tests with coverage
        run: flutter test test/unit/ --coverage --reporter compact

      - name: Report filtered line coverage
        run: python scripts/coverage.py --filter-only

      - name: Upload filtered coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-lcov-filtered
          path: coverage/lcov.filtered.info
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ always() && hashFiles('coverage/lcov.filtered.info') != '' }}
        with:
          files: coverage/lcov.filtered.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

      - name: Integration tests skipped on GitHub Actions
        run: echo "Integration tests run only in local/dev environments."
