name: backup_database
version: 3.3.1
publish_to: none

environment:
  sdk: ^3.10.1

description: Sistema de backup automatico para SQL Server, Sybase, PostgreSQL e Firebird

dependencies:
  archive: ^4.0.7
  brasil_fields: ^1.18.0
  cron: ^0.6.2
  crypto: ^3.0.7
  cupertino_icons: ^1.0.8
  desktop_webview_window: ^0.2.3
  dio: ^5.9.0
  drift: ^2.29.0
  ed25519_edwards: ^0.3.1
  encrypt: ^5.0.3
  ffi: ^2.1.3
  file_picker: ^10.3.7
  fluent_ui: ^4.13.0

  flutter:
    sdk: flutter

  flutter_acrylic: ^1.1.4
  flutter_dotenv: ^6.0.0
  flutter_secure_storage: any

  freezed_annotation: ^3.1.0
  ftpconnect:
    path: packages/ftpconnect

  get_it: ^9.1.1
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  googleapis: ^15.0.0
  http: ^1.2.2
  intl: ^0.20.2
  logger: ^2.6.2
  mailer: ^6.6.0
  meta: ^1.16.0
  oauth2_client: ^4.2.1
  package_info_plus: ^8.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  pub_semver: ^2.1.5
  qr_flutter: ^4.1.0
  result_dart: ^2.1.1
  shared_preferences: ^2.3.3
  shimmer: ^3.0.0
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.40
  system_theme: ^3.2.0
  timezone: ^0.10.1
  tray_manager: ^0.5.2
  url_launcher: ^6.3.1
  uuid: ^4.5.2
  win32: ^5.15.0
  window_manager: ^0.5.1
  xml: ^6.5.0
  zard: ^0.0.24

dev_dependencies:
  build_runner: ^2.10.4
  coverage: ^1.15.0
  drift_dev: ^2.29.0
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

  flutter_test:
    sdk: flutter

  freezed: ^3.2.5
  ftp_server: ^2.1.1
  mocktail: ^1.0.4
  pubspec_dependency_sorter: ^1.0.5
  very_good_analysis: ^10.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/image/new/database_128px.png
    - assets/image/new/app_tray.ico
flutter_launcher_icons:
  android: false
  windows:
    generate: true
    image_path: assets/image/new/database_512px.png
    icon_size: 256
